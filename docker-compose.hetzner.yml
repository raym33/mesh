services:
  hub:
    build:
      context: .
    image: mesh:local
    restart: unless-stopped
    environment:
      HOST: 0.0.0.0
      PORT: 4180
      MESH_PUBLIC_URL: https://${MESH_DOMAIN}
      MESH_STATE_FILE: /app/server/data/network-state.json
      MESH_RESEARCH_PURGE_INTERVAL_MS: ${MESH_RESEARCH_PURGE_INTERVAL_MS:-900000}
      MESH_ADMIN_TOKEN: ${MESH_ADMIN_TOKEN}
      MESH_BRIDGE_TOKEN: ${MESH_BRIDGE_TOKEN}
      MESH_WEB_RESEARCH_PROVIDER: ${MESH_WEB_RESEARCH_PROVIDER:-duckduckgo}
      MESH_WEB_RESEARCH_URL: ${MESH_WEB_RESEARCH_URL:-}
      MESH_WEB_RESEARCH_API_KEY: ${MESH_WEB_RESEARCH_API_KEY:-}
      MESH_WEB_RESEARCH_MAX_RESULTS: ${MESH_WEB_RESEARCH_MAX_RESULTS:-5}
      MESH_WEB_RESEARCH_FETCH_COUNT: ${MESH_WEB_RESEARCH_FETCH_COUNT:-2}
      MESH_WEB_RESEARCH_FETCH_TIMEOUT_MS: ${MESH_WEB_RESEARCH_FETCH_TIMEOUT_MS:-15000}
      MESH_WEB_RESEARCH_MAX_BODY_BYTES: ${MESH_WEB_RESEARCH_MAX_BODY_BYTES:-524288}
      MESH_WEB_RESEARCH_MAX_REDIRECTS: ${MESH_WEB_RESEARCH_MAX_REDIRECTS:-3}
      MESH_WEB_RESEARCH_ALLOW_PRIVATE_HOSTS: ${MESH_WEB_RESEARCH_ALLOW_PRIVATE_HOSTS:-false}
    volumes:
      - mesh-data:/app/server/data
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:4180/healthz').then((response)=>process.exit(response.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  worker:
    build:
      context: .
    image: mesh:local
    restart: unless-stopped
    command: ["node", "server/search-worker.mjs", "--hub", "http://hub:4180"]
    depends_on:
      hub:
        condition: service_healthy
    environment:
      NODE_ENV: production
      MESH_HUB_TOKEN: ${MESH_BRIDGE_TOKEN}
    volumes:
      - mesh-data:/app/server/data

  proxy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      hub:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    environment:
      MESH_DOMAIN: ${MESH_DOMAIN}
      MESH_EMAIL: ${MESH_EMAIL}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  mesh-data:
  caddy-data:
  caddy-config:
